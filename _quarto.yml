project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll
    - cv/Raphael_Ludwig_CV.pdf

website:
  title: "Raphael Ludwig"
  site-url: "https://raphaludwig.github.io"
  description: "Quantitative economist — macro research, forecasting & applied econometrics."
  favicon: assets/img/monogram.svg
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: blog/index.qmd
        text: Blog
    right:
      - icon: linkedin
        href: "https://www.linkedin.com/in/raphael-ludwig-167347414"
        aria-label: LinkedIn
      - icon: envelope
        href: "mailto:raphaludwig@gmail.com"
        aria-label: Email
  page-footer:
    left: "© 2026 Raphael Ludwig"
    center: "Built with [Quarto](https://quarto.org)"
    right:
      - icon: envelope
        href: mailto:raphaludwig@gmail.com
      - icon: linkedin
        href: "https://www.linkedin.com/in/raphael-ludwig-167347414"

format:
  html:
    theme: [cosmo, assets/css/theme.scss]
    css: assets/css/site.css
    toc: false
    grid:
      body-width: 900px
    link-external-newwindow: true
    include-after-body: assets/html/palette-switcher-embed.html

execute:
  freeze: auto
